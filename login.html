<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex"/>
<meta name="description" content="Tìm chuỗi kết nối ngắn nhất giữa các doanh nhân Việt Nam qua ban lãnh đạo doanh nghiệp niêm yết (dữ liệu CafeF)."/>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<meta name="theme-color" content="#004aef"/>
<meta property="og:type" content="website"/>
<meta property="og:title" content="Mạng lưới quan hệ doanh nhân Việt Nam"/>
<meta property="og:description" content="Tìm chuỗi kết nối ngắn nhất giữa các doanh nhân Việt Nam qua ban lãnh đạo doanh nghiệp niêm yết (dữ liệu CafeF)."/>
<meta property="og:image" content="favicon.svg"/>
<meta name="twitter:card" content="summary"/>
<title>Đăng nhập — Mạng lưới quan hệ doanh nhân VN</title>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="login-page">
  <div class="gate-card">
    <div class="gate-logo">🔗</div>
    <h2>Mạng lưới quan hệ doanh nhân VN</h2>
    <p class="gate-sub">Đăng nhập để sử dụng. Dữ liệu bạn khai báo do chính bạn quản lý.</p>
    <div class="gate-tabs">
      <button class="gt on" data-tab="login">Đăng nhập</button>
      <button class="gt" data-tab="register">Đăng ký</button>
    </div>
    <div id="loginForm">
      <input id="liEmail" type="email" autocomplete="email" placeholder="Email"/>
      <input id="liPass" type="password" autocomplete="current-password" placeholder="Mật khẩu"/>
      <div class="gate-row2">
        <label><input type="checkbox" id="liShow"/> Hiện mật khẩu</label>
        <a href="#" id="liForgot">Quên mật khẩu?</a>
      </div>
      <button class="btn gate-btn" id="liBtn">Đăng nhập</button>
    </div>
    <div id="registerForm" hidden>
      <input id="rgName" placeholder="Tên hiển thị (vd: Nguyễn Văn A)"/>
      <input id="rgEmail" type="email" autocomplete="email" placeholder="Email"/>
      <input id="rgPass" type="password" autocomplete="new-password" placeholder="Mật khẩu (≥ 6 ký tự)"/>
      <div class="gate-row2">
        <label><input type="checkbox" id="rgShow"/> Hiện mật khẩu</label>
      </div>
      <button class="btn gate-btn" id="rgBtn">Tạo tài khoản</button>
    </div>
    <div class="gate-status" id="gateStatus"></div>
  </div>
</div>
<script type="module" src="login.js"></script>
</body>
</html>
