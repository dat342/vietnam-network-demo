<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex"/>
<meta name="description" content="Tìm chuỗi kết nối ngắn nhất giữa các doanh nhân Việt Nam qua ban lãnh đạo doanh nghiệp niêm yết (dữ liệu CafeF)."/>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<meta name="theme-color" content="#004aef"/>
<title>Khám phá mạng lưới — Mạng lưới quan hệ doanh nhân VN</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://cafef1.mediacdn.vn"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="pageLoading" class="page-loading"><div class="spin"></div>Đang tải…</div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div class="page-title">Khám phá mạng lưới</div>
      <div class="page-sub">Chọn một người để xem mạng lưới quanh họ. Bấm vào node bất kỳ để khám phá tiếp.</div>
      <div class="panel" style="margin-bottom:14px">
        <div class="field" style="max-width:440px;position:relative;margin:0">
          <input id="centerSearch" autocomplete="off" placeholder="Nhập tên người để xem mạng lưới…"/>
          <div class="ac" id="centerAc"></div>
        </div>
      </div>
      <div id="graph" class="graph-box"></div>
      <div class="graph-legend">
        <span><i class="lg-dot" style="background:#004aef"></i> Người đang xem</span>
        <span><i class="lg-dot" style="background:#3d74ff"></i> Người</span>
        <span><i class="lg-dot" style="background:#16a34a"></i> Người dùng thêm</span>
        <span><i class="lg-sq" style="background:#e0a400"></i> Công ty</span>
      </div>
    </div>
  </div>
</div>
<script src="data.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
