<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Khai báo quan hệ — Mạng lưới quan hệ doanh nhân VN</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="pageLoading" class="page-loading"><div class="spin"></div>Đang tải…</div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
  <header>
    <h1>➕ <span class="g">Khai báo quan hệ</span> của bạn</h1>
    <p class="sub">Node của bạn trong mạng lưới là <b id="meName">—</b>. Khai báo tối đa 3 người bạn quen — mọi người đều thấy.</p>
  </header>

  <div class="panel">
    <div class="form-grid2">
      <div class="form-row"><label>Phòng ban của bạn (tuỳ chọn)</label><input id="dcDept" placeholder="VD: Khối Kinh doanh"/></div>
      <div class="form-row"><label>Chức vụ của bạn (tuỳ chọn)</label><input id="dcTitle" placeholder="VD: Trưởng phòng"/></div>
    </div>
    <div class="form-grid2">
      <div class="form-row"><label>Năm bắt đầu (tuỳ chọn)</label><input id="dcStart" inputmode="numeric" placeholder="VD: 2018"/></div>
      <div class="form-row"><label>Năm kết thúc (trống = đang làm)</label><input id="dcEnd" inputmode="numeric" placeholder="VD: 2023"/></div>
    </div>
    <div class="contacts-head">Người bạn quen</div>
    <div id="dcRows"></div>
    <button class="btn ghost sm add-contact" id="addContact" type="button"><i class="ti ti-plus" aria-hidden="true"></i> Thêm người quen</button>
    <div class="modal-status" id="dcStatus"></div>
    <div class="modal-actions">
      <a class="btn ghost" href="index.html">Huỷ</a>
      <button class="btn" id="dcSave">💾 Lưu vào mạng lưới</button>
    </div>
  </div>
    </div>
  </div>
</div>
<script src="data.js"></script>
<script type="module" src="khaibao.js"></script>
</body>
</html>
