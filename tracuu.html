<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex"/>
<meta name="description" content="Tìm chuỗi kết nối ngắn nhất giữa các doanh nhân Việt Nam qua ban lãnh đạo doanh nghiệp niêm yết (dữ liệu CafeF)."/>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<meta name="theme-color" content="#004aef"/>
<title>Tra cứu nhân sự — Mạng lưới quan hệ doanh nhân VN</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://cafef1.mediacdn.vn"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="pageLoading" class="page-loading"><div class="spin"></div>Đang tải…</div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div class="page-title">Tra cứu nhân sự</div>
      <div class="page-sub">Chọn công ty và phòng ban để xem danh sách lãnh đạo.</div>
      <div class="panel">
        <div class="filter-row">
          <div class="filter-field"><label>Công ty</label>
            <input id="selCompany" class="plain-input" list="companyOptions" autocomplete="off" placeholder="Gõ hoặc chọn mã (vd: VNM, FPT)…"/>
            <datalist id="companyOptions"></datalist>
          </div>
          <div class="filter-field"><label>Phòng ban</label><select id="selDept"></select></div>
        </div>
      </div>
      <div id="results"></div>
    </div>
  </div>
</div>
<script src="data.js"></script>
<script type="module" src="tracuu.js"></script>
</body>
</html>
